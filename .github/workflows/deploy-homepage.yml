# Deploy the Next.js Homepage app to Cloudflare Workers
# Triggers on pushes to main that change the homepage app or shared packages

name: Deploy Homepage to Cloudflare

on:
    push:
        branches: [main]
        paths:
            - "apps/ottabase-template-app-nextjs-homepage/**"
            - "packages/**"
    workflow_dispatch:

jobs:
    build-packages:
        name: Build Packages
        uses: ./.github/workflows/build-packages.yml

    deploy-homepage:
        needs: build-packages
        runs-on: ubuntu-latest
        timeout-minutes: 20
        name: Deploy Homepage

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts=false

            # Restore pre-built packages
            - name: Restore packages cache
              id: restore-packages
              run: |
                  PACKAGE_HASH=$(find packages -type f \
                    -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" -o -name "*.json" \
                    | sort | xargs cat | sha256sum | cut -d' ' -f1)
                  LOCK_HASH=$(sha256sum pnpm-lock.yaml | cut -d' ' -f1)
                  echo "cache-key=packages-build-${LOCK_HASH}-${PACKAGE_HASH}" >> $GITHUB_OUTPUT

            - name: Restore cached packages
              uses: actions/cache/restore@v4
              with:
                  path: |
                      packages/*/dist
                      packages/*/build
                      packages/*/.turbo
                      .turbo
                  key: ${{ steps.restore-packages.outputs.cache-key }}
                  restore-keys: packages-build-
                  fail-on-cache-miss: true

            # Cache Next.js build
            - name: Cache Next.js build
              uses: actions/cache@v4
              with:
                  path: apps/ottabase-template-app-nextjs-homepage/.next/cache
                  key:
                      nextjs-homepage-${{ hashFiles('pnpm-lock.yaml') }}-${{
                      hashFiles('apps/ottabase-template-app-nextjs-homepage/**/*.{ts,tsx}') }}
                  restore-keys: nextjs-homepage-${{ hashFiles('pnpm-lock.yaml') }}-

            # Build Next.js app
            - name: Build Next.js app
              run: pnpm --filter @ottabase/ottabase-template-app-nextjs-homepage run build

            # Build OpenNext worker bundle
            - name: Build worker
              run: pnpm --filter @ottabase/ottabase-template-app-nextjs-homepage run build:worker

            # Verify build output
            - name: Verify build
              working-directory: apps/ottabase-template-app-nextjs-homepage
              run: |
                  if [ ! -d ".open-next" ]; then
                    echo "::error::OpenNext build output not found at .open-next/"
                    exit 1
                  fi
                  echo "Build verified — .open-next/ exists"

            # Deploy to Cloudflare Workers
            - name: Deploy to Cloudflare Workers
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: apps/ottabase-template-app-nextjs-homepage
                  command: deploy --config wrangler.jsonc --env production
