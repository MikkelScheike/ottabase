name: CI - Build & Test

on:
    workflow_dispatch:  # Manual trigger only
    # Disabled automatic triggers - uncomment to enable:
    # pull_request:
    #     branches:
    #         - main
    #         - develop
    # push:
    #     branches:
    #         - main
    #         - develop

jobs:
    # Test on multiple platforms
    test:
        name: Test on ${{ matrix.os }} - Node ${{ matrix.node }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                node: ["24"]
                # Optionally test multiple Node versions
                # node: ['24', '22']

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10.15.1

            - name: Setup Node.js ${{ matrix.node }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            # Setup Prisma (build scripts are disabled by default, so we need to run postinstall manually)
            - name: Setup Prisma
              run: |
                  # Find and run Prisma postinstall scripts
                  if [ -d "node_modules/.pnpm/prisma@"* ]; then
                    cd node_modules/.pnpm/prisma@*/node_modules/prisma
                    npm run postinstall || true
                    cd ../../../../..
                  fi
                  if [ -d "node_modules/.pnpm/@prisma+client@"* ]; then
                    cd node_modules/.pnpm/@prisma+client@*/node_modules/@prisma/client
                    npm run postinstall || true
                    cd ../../../../..
                  fi
                  # Now generate the Prisma Client
                  pnpm --filter @ottabase/db prisma:generate

            # Cache Turborepo build outputs
            - name: Setup Turborepo cache
              uses: actions/cache@v4
              with:
                  path: |
                      .turbo
                      **/node_modules/.cache/turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Lint
              run: pnpm lint
              continue-on-error: true

            - name: Type Check
              run: pnpm type-check

            - name: Build All Packages (with Turborepo)
              run: pnpm turbo build --filter="./packages/*"

            - name: Build All Apps (with dependencies)
              run: pnpm turbo build --filter="./apps/*..."

            - name: Test
              run: pnpm test
              continue-on-error: true

    # Validate Cloudflare configuration
    validate-cloudflare:
        name: Validate Cloudflare Config
        runs-on: ubuntu-latest
        needs: test
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10.15.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate Cloudflare Configuration
              run: pnpm cloudflare:validate
              continue-on-error: true
