name: CI - Build & Test

on:
    workflow_dispatch:
#     pull_request:
#         branches:
#             - main
#             - develop
#     push:
#         branches:
#             - main
#             - develop

jobs:
    # Build & Test on ubuntu-latest
    test:
        name: CI - Build & Test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        strategy:
            fail-fast: false

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v3

            - name: Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Cache Turborepo build outputs
            - name: Setup Turborepo cache
              uses: actions/cache@v4
              with:
                  path: |
                      .turbo
                      **/node_modules/.cache/turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Run CI (Lint, Type-Check, Build, Test)
              run: pnpm turbo run lint type-check test build

    # Validate Cloudflare configuration
    validate-cloudflare:
        name: Validate Cloudflare Config
        runs-on: ubuntu-latest
        needs: test
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate Cloudflare Configuration
              run: pnpm cloudflare:validate
              continue-on-error: true
