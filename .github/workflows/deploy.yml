name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy ${{ matrix.app }} (apps/${{ matrix.folder }})
    strategy:
      matrix:
        include:
          - app: "@ottabase/ottabase-template-app"
            folder: "ottabase-template-app"
        # Add more apps here as needed, e.g.
        # - app: "@ottabase/app1"
        #   folder: "app1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts=false

      # Verify build tools are accessible
      - name: Verify build tools
        run: |
          echo "Verifying build tool installation..."
          echo "Node modules bin directory:"
          ls -la node_modules/.bin/ | grep -E "tsup|rimraf" || true
          echo ""
          echo "Checking PATH:"
          echo $PATH
          echo ""
          echo "Testing tsup:"
          pnpm exec tsup --version
          echo "Testing rimraf:"
          pnpm exec rimraf --version

      # Cache Turborepo local cache for faster builds
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Cache Next.js build for faster rebuilds (per app)
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/${{ matrix.folder }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.folder }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.folder }}-
            ${{ runner.os }}-nextjs-

      # Build via Turborepo so .turbo cache is populated (app + its deps)
      - name: Build (Turbo)
        run: |
          export PATH="${GITHUB_WORKSPACE}/node_modules/.bin:$PATH"
          pnpm turbo build --filter=${{ matrix.app }}...
        env:
          NODE_ENV: production

      # Build Cloudflare Worker bundle
      - name: Build Cloudflare Worker
        working-directory: apps/${{ matrix.folder }}
        run: pnpm build:worker

      # Substitute production secrets into wrangler.jsonc
      - name: Substitute production resource IDs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/${{ matrix.folder }}
        run: |
          sed -i 's/PRODUCTION_D1_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/g' wrangler.jsonc
          sed -i 's/PRODUCTION_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g' wrangler.jsonc

      # Deploy to Cloudflare Workers
      - name: Deploy to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ matrix.folder }}
          command: deploy --env production
