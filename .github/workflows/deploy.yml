name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy ${{ matrix.app }}
    strategy:
      matrix:
        app: ['@ottabase/ottabase-template-app']
        # Add more apps here as needed, e.g. '@ottabase/app1', '@ottabase/app2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies with Prisma postinstall
        run: |
          # Allow build scripts for Prisma packages only
          pnpm config set enable-pre-post-scripts true
          pnpm install --frozen-lockfile
        env:
          # Ensure Prisma runs its postinstall
          PRISMA_SKIP_POSTINSTALL_GENERATE: false

      # Cache Turborepo outputs for faster builds
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Cache Next.js build for faster rebuilds
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/*/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      # Extract app folder name for later steps
      - name: Set app folder name
        id: app-info
        run: |
          APP_FOLDER=$(echo "${{ matrix.app }}" | sed 's/@ottabase\///')
          echo "folder=$APP_FOLDER" >> $GITHUB_OUTPUT

      # Build packages first
      - name: Build packages
        run: pnpm turbo build --filter="./packages/*"
        env:
          NODE_ENV: production

      # Generate database schema and migrations for the app
      - name: Generate Prisma schema
        working-directory: apps/${{ steps.app-info.outputs.folder }}
        run: pnpm db:generate

      # Build the app and all its dependencies using Turborepo
      - name: Build application
        run: pnpm turbo build --filter=${{ matrix.app }}
        env:
          NODE_ENV: production

      # Build Cloudflare Worker bundle
      - name: Build Cloudflare Worker
        working-directory: apps/${{ steps.app-info.outputs.folder }}
        run: pnpm build:worker

      # Substitute production secrets into wrangler.jsonc
      - name: Substitute production resource IDs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/${{ steps.app-info.outputs.folder }}
        run: |
          sed -i 's/PRODUCTION_D1_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/g' wrangler.jsonc
          sed -i 's/PRODUCTION_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g' wrangler.jsonc

      # Apply database migrations to production D1
      - name: Apply database migrations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/${{ steps.app-info.outputs.folder }}
        run: |
          # Check if migrations directory exists and has migrations
          if [ -d "prisma/migrations" ] && [ "$(ls -A prisma/migrations)" ]; then
            echo "Applying migrations to production D1 database..."
            # Get list of migration directories
            for migration_dir in prisma/migrations/*/; do
              if [ -f "${migration_dir}migration.sql" ]; then
                echo "Applying migration: $(basename $migration_dir)"
                # Try to apply migration, check for specific error messages
                if ! output=$(pnpm wrangler d1 execute ${{ secrets.D1_DATABASE_NAME || 'ottabase-db' }} \
                  --remote \
                  --file="${migration_dir}migration.sql" 2>&1); then
                  # Check if error is about already existing objects (safe to ignore)
                  if echo "$output" | grep -qiE "(already exists|duplicate|UNIQUE constraint failed)"; then
                    echo "⚠️  Migration already applied, skipping..."
                  else
                    # Real error - fail the build
                    echo "❌ Migration failed with error:"
                    echo "$output"
                    exit 1
                  fi
                else
                  echo "✓ Migration applied successfully"
                fi
              fi
            done
            echo "All migrations processed"
          else
            echo "No migrations found, skipping migration step"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy to Cloudflare Workers
      - name: Deploy to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ steps.app-info.outputs.folder }}
          command: deploy --env production
