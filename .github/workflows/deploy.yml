name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy ${{ matrix.app }}
    strategy:
      matrix:
        app: ['@ottabase/ottabase-template-app']
        # Add more apps here as needed, e.g. '@ottabase/app1', '@ottabase/app2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.15.1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app folder name
        id: app-info
        run: |
          # Extract folder name from scoped package name (@ottabase/app-name -> app-name)
          APP_FOLDER=$(echo "${{ matrix.app }}" | sed 's/@ottabase\///')
          echo "folder=$APP_FOLDER" >> $GITHUB_OUTPUT

      - name: Build with Turborepo (includes dependencies)
        run: pnpm turbo build --filter=${{ matrix.app }}...
        env:
          NODE_ENV: production

      - name: Substitute production resource IDs
        working-directory: apps/${{ steps.app-info.outputs.folder }}
        run: |
          # Replace placeholder IDs with actual values from GitHub secrets
          sed -i 's/PRODUCTION_D1_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/g' wrangler.jsonc
          sed -i 's/PRODUCTION_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g' wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ steps.app-info.outputs.folder }}
          command: deploy --env production
