name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Deploy ${{ matrix.app }}
    strategy:
      matrix:
        app: ["@ottabase/ottabase-template-app"]
        # Add more apps here as needed, e.g. '@ottabase/app1', '@ottabase/app2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts=false

      # Verify build tools are accessible
      - name: Verify build tools
        run: |
          echo "Verifying build tool installation..."
          echo "Node modules bin directory:"
          ls -la node_modules/.bin/ | grep -E "tsup|rimraf" || true
          echo ""
          echo "Checking PATH:"
          echo $PATH
          echo ""
          echo "Testing tsup:"
          pnpm exec tsup --version
          echo "Testing rimraf:"
          pnpm exec rimraf --version

      # Cache Turborepo outputs for faster builds
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      # Cache Next.js build for faster rebuilds
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/*/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/**/*.ts', 'apps/**/*.tsx', 'apps/**/*.js', 'apps/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      # Extract app folder name for later steps
      - name: Set app folder name
        id: app-info
        run: |
          APP_FOLDER=$(echo "${{ matrix.app }}" | sed 's/@ottabase\///')
          echo "folder=$APP_FOLDER" >> $GITHUB_OUTPUT

      # Build packages first
      - name: Build packages
        run: |
          export PATH="${GITHUB_WORKSPACE}/node_modules/.bin:$PATH"
          echo "Building all packages serially using pnpm..."
          pnpm --filter "./packages/**" --workspace-concurrency=5 run build
        env:
          NODE_ENV: production

      # Build the app and all its dependencies
      - name: Build application
        run: |
          export PATH="${GITHUB_WORKSPACE}/node_modules/.bin:$PATH"
          pnpm --filter=${{ matrix.app }} run build
        env:
          NODE_ENV: production

      # Build Cloudflare Worker bundle
      - name: Build Cloudflare Worker
        working-directory: apps/${{ steps.app-info.outputs.folder }}
        run: pnpm build:worker

      # Substitute production secrets into wrangler.jsonc
      - name: Substitute production resource IDs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/${{ steps.app-info.outputs.folder }}
        run: |
          sed -i 's/PRODUCTION_D1_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/g' wrangler.jsonc
          sed -i 's/PRODUCTION_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g' wrangler.jsonc

      # Deploy to Cloudflare Workers
      - name: Deploy to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/${{ steps.app-info.outputs.folder }}
          command: deploy --env production
