name: PR Preview Deployments

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]

concurrency:
    group: pr-preview-${{ github.event.pull_request.number }}
    cancel-in-progress: true

# cancel-in-progress (concurrency block above) is handled by the Actions runner
# and does not require actions: write — contents: read is sufficient.
permissions:
    contents: read

jobs:
    # Check PR title/body for #skippr or #skipdeploy to skip preview build & deploy
    check-skip-pr:
        runs-on: ubuntu-latest
        outputs:
            skip_pr: ${{ steps.check.outputs.skip_pr }}
        steps:
            - name: Check for skip markers
              id: check
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_BODY: ${{ github.event.pull_request.body || '' }}
              run: |
                  if printf '%s\n' "$PR_TITLE" "$PR_BODY" | grep -qiE '#skippr|#skipdeploy'; then
                    echo "skip_pr=true" >> $GITHUB_OUTPUT
                    echo "⏭️  Skipping PR preview: #skippr or #skipdeploy found in PR title/description"
                  else
                    echo "skip_pr=false" >> $GITHUB_OUTPUT
                    echo "✅ No skip markers – PR preview will run"
                  fi

    # Build and cache packages first (reusable workflow)
    build-packages:
        needs: check-skip-pr
        if: github.event.action != 'closed' && needs.check-skip-pr.outputs.skip_pr != 'true'
        uses: ./.github/workflows/build-packages.yml

    # Prepare deployment matrix for preview environments (skipped when build-packages is skipped, i.e. skip_pr=true)
    prepare-deployment:
        needs: [build-packages, check-skip-pr]
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        name: Prepare preview deployment
        outputs:
            matrix: ${{ steps.build-matrix.outputs.matrix }}
            has-apps: ${{ steps.build-matrix.outputs.has-apps }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - name: Find target apps / Build preview matrix
              id: build-matrix
              run: |
                  echo "🔍 Preparing preview deployment matrix..."

                  # Always deploy previews for the configured apps.
                  # APPS_TO_DEPLOY is a comma-separated list of app *folder* names under apps/.
                  # Each app must have a cloudflare-config.json that drives its build + deploy.
                  # When you rename/copy an app, update cloudflare-config.json + wrangler.jsonc
                  # inside that app, then set the APPS_TO_DEPLOY secret - no yml editing needed.
                  APPS_TO_DEPLOY="${{ secrets.APPS_TO_DEPLOY }}"
                  if [ -z "$APPS_TO_DEPLOY" ]; then
                    APPS_TO_DEPLOY="ottabase-template-app-tanstack,ottabase-template-app-nextjs-homepage"
                    echo "📋 Using default apps: ${APPS_TO_DEPLOY}"
                  else
                    echo "📋 Apps from secret: ${APPS_TO_DEPLOY}"
                  fi

                  IFS=',' read -ra TARGET_APPS <<< "$APPS_TO_DEPLOY"
                  echo "🎯 Target apps: ${TARGET_APPS[*]}"

                  # Detect changes (informational only for previews)
                  CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || true)
                  if [ -z "$CHANGED_FILES" ]; then
                    echo "ℹ️ No change information available (shallow clone or initial commit)"
                  else
                    echo "📝 Changed files:"
                    echo "$CHANGED_FILES"
                  fi
                  echo ""

                  MATRIX_JSON='{"include":['
                  FIRST=true

                  for target_app in "${TARGET_APPS[@]}"; do
                    target_app=$(echo "$target_app" | xargs)

                    APP_FOLDER=""
                    if [ -d "apps/${target_app}" ]; then
                      APP_FOLDER="${target_app}"
                    else
                      for dir in apps/*/; do
                        if [ -f "${dir}package.json" ]; then
                          PKG_NAME=$(jq -r '.name // empty' "${dir}package.json")
                          if [ "$PKG_NAME" == "$target_app" ]; then
                            APP_FOLDER=$(basename "$dir")
                            break
                          fi
                        fi
                      done
                    fi

                    if [ -z "$APP_FOLDER" ]; then
                      echo "⚠️  Warning: Could not find app '${target_app}', skipping"
                      continue
                    fi

                    APP_PATH="apps/${APP_FOLDER}"
                    PKG_JSON="${APP_PATH}/package.json"
                    CONFIG_JSON="${APP_PATH}/cloudflare-config.json"

                    if [ ! -f "$PKG_JSON" ]; then
                      echo "⚠️  Warning: No package.json for ${APP_FOLDER}, skipping"
                      continue
                    fi

                    PKG_NAME=$(jq -r '.name // empty' "$PKG_JSON")

                    if [ -f "$CONFIG_JSON" ]; then
                      CONFIG=$(cat "$CONFIG_JSON")
                    else
                      if [ ! -f "${APP_PATH}/wrangler.jsonc" ]; then
                        echo "⚠️  Warning: No cloudflare-config.json or wrangler.jsonc for ${APP_FOLDER}, skipping"
                        continue
                      fi
                      CONFIG='{"deployable":true,"appType":"tanstack","buildCommand":"build","workerBuildCommand":null,"outputDirectory":"dist","verifyPaths":["dist","cloudflare-worker.ts"],"wranglerConfig":"wrangler.jsonc","wranglerEnv":"production","healthCheckPath":"/"}'
                    fi

                    DEPLOYABLE=$(echo "$CONFIG" | jq -r '.deployable // true')
                    if [ "$DEPLOYABLE" == "false" ]; then
                      echo "⏭️  Skipping ${APP_FOLDER}: deployable=false"
                      continue
                    fi

                    if [ "$FIRST" == "true" ]; then
                      FIRST=false
                    else
                      MATRIX_JSON="${MATRIX_JSON},"
                    fi

                    ENTRY=$(jq -c -n \
                      --arg name "$PKG_NAME" \
                      --arg folder "$APP_FOLDER" \
                      --argjson config "$CONFIG" \
                      '{name: $name, folder: $folder, config: $config}')

                    MATRIX_JSON="${MATRIX_JSON}${ENTRY}"
                    echo "✅ Added ${APP_FOLDER} to preview matrix"
                  done

                  MATRIX_JSON="${MATRIX_JSON}]}"
                  echo "matrix=${MATRIX_JSON}" >> $GITHUB_OUTPUT

                  APP_COUNT=$(echo "${MATRIX_JSON}" | jq '.include | length')
                  if [ "$APP_COUNT" -gt 0 ]; then
                    echo "has-apps=true" >> $GITHUB_OUTPUT
                    echo ""
                    echo "✅ Will deploy ${APP_COUNT} preview app(s)"
                  else
                    echo "has-apps=false" >> $GITHUB_OUTPUT
                    echo ""
                    echo "⏭️  No apps to deploy"
                  fi

    # Deploy preview for each app
    deploy-preview:
        needs: [build-packages, prepare-deployment]
        if: needs.prepare-deployment.outputs.has-apps == 'true' && github.event.action != 'closed'
        runs-on: ubuntu-latest
        timeout-minutes: 25
        name: Preview ${{ matrix.name }}
        strategy:
            matrix: ${{ fromJson(needs.prepare-deployment.outputs.matrix) }}
            fail-fast: false

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Compute preview worker name
              id: preview-name
              run: |
                  BASE_NAME="${{ matrix.config.workerName || matrix.folder }}"
                  echo "preview-name=${BASE_NAME}-pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

            - name: Load app configuration
              id: config
              run: |
                  CONFIG='${{ toJson(matrix.config) }}'

                  echo "app-type=$(echo "${CONFIG}" | jq -r '.appType')" >> $GITHUB_OUTPUT
                  echo "build-cmd=$(echo "${CONFIG}" | jq -r '.buildCommand')" >> $GITHUB_OUTPUT
                  echo "worker-build-cmd=$(echo "${CONFIG}" | jq -r '.workerBuildCommand // empty')" >> $GITHUB_OUTPUT
                  echo "output-dir=$(echo "${CONFIG}" | jq -r '.outputDirectory')" >> $GITHUB_OUTPUT
                  echo "assets-dir=$(echo "${CONFIG}" | jq -r '.assetsDirectory // empty')" >> $GITHUB_OUTPUT
                  echo "wrangler-config=$(echo "${CONFIG}" | jq -r '.wranglerConfig')" >> $GITHUB_OUTPUT
                  echo "wrangler-env=$(echo "${CONFIG}" | jq -r '.wranglerEnv')" >> $GITHUB_OUTPUT
                  echo "health-check=$(echo "${CONFIG}" | jq -r '.healthCheckPath // "/"')" >> $GITHUB_OUTPUT

                  WORKER_SUBDOMAIN="${{ secrets.CF_WORKER_SUBDOMAIN }}"
                  if [ -z "$WORKER_SUBDOMAIN" ]; then
                    WORKER_SUBDOMAIN="apiary"
                  fi
                  echo "worker-subdomain=${WORKER_SUBDOMAIN}" >> $GITHUB_OUTPUT

                  VERIFY_PATHS=$(echo "${CONFIG}" | jq -r '.verifyPaths[]?' 2>/dev/null || true)
                  echo "verify-paths<<EOF" >> $GITHUB_OUTPUT
                  echo "${VERIFY_PATHS}" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

                  # Optional: extra secrets from config (merged with derived placeholders in Verify step)
                  EXTRA=$(echo "${CONFIG}" | jq -r '.requiresPreviewSecrets[]?' | tr '\n' ' ')
                  echo "extra-secrets=${EXTRA}" >> $GITHUB_OUTPUT

                  echo "📋 Configuration loaded for ${{ matrix.name }} (preview)"

            # Secrets derived from wrangler.jsonc env.preview + base + optional extra (single source of truth; no drift)
            - name: Verify required secrets
              working-directory: apps/${{ matrix.folder }}
              env:
                  SECRETS_JSON: ${{ toJson(secrets) }}
                  WRANGLER_CONFIG: ${{ steps.config.outputs.wrangler-config }}
                  TARGET_ENV: preview
              run: |
                  echo "🔍 Verifying required secrets for ${{ matrix.name }}..."

                  # Base secrets (wrangler-action needs these)
                  BASE="CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID"

                  # Derive placeholders from wrangler.jsonc env.preview (single source of truth; no drift)
                  PLACEHOLDERS=$(python ../../.github/scripts/substitute-wrangler-secrets.py --list-only)

                  # Optional extra from cloudflare-config.json requiresPreviewSecrets
                  EXTRA="${{ steps.config.outputs.extra-secrets }}"

                  # Merge: base + placeholders + extra, deduplicate, drop empty
                  REQUIRED=$(echo "$BASE $PLACEHOLDERS $EXTRA" | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' ')

                  MISSING_SECRETS=()
                  for SECRET_NAME in $REQUIRED; do
                    VAL=$(echo "$SECRETS_JSON" | jq -r --arg k "$SECRET_NAME" '.[$k] // empty')
                    if [ -z "$VAL" ]; then
                      MISSING_SECRETS+=("$SECRET_NAME")
                      echo "  ❌ $SECRET_NAME is not set (run pnpm cf:setup, add to GitHub Secrets)"
                    else
                      echo "  ✅ $SECRET_NAME is configured"
                    fi
                  done

                  if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
                    echo ""
                    echo "❌ ERROR: Missing required GitHub secrets for preview deployment"
                    printf '  • %s\n' "${MISSING_SECRETS[@]}"
                    exit 1
                  fi

                  echo ""
                  echo "✅ All required secrets are configured"

            - name: Setup pnpm
              uses: pnpm/action-setup@v3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts=false

            - name: Cache Turborepo
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
                      ${{ runner.os }}-turbo-

            - name: Cache Next.js builds
              if: steps.config.outputs.app-type == 'nextjs'
              uses: actions/cache@v4
              with:
                  path: |
                      apps/${{ matrix.folder }}/.next/cache
                      apps/${{ matrix.folder }}/.next/standalone
                  key:
                      ${{ runner.os }}-nextjs-${{ matrix.folder }}-${{ hashFiles('pnpm-lock.yaml') }}-${{
                      hashFiles('apps/${{ matrix.folder }}/**/*.{ts,tsx,js,jsx}') }}-${{ hashFiles('apps/${{
                      matrix.folder }}/wrangler.jsonc', 'apps/${{ matrix.folder }}/open-next.config.ts', 'apps/${{
                      matrix.folder }}/next.config.js') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ matrix.folder }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/${{ matrix.folder }}/**/*.{ts,tsx,js,jsx}') }}-
                      ${{ runner.os }}-nextjs-${{ matrix.folder }}-${{ hashFiles('pnpm-lock.yaml') }}-
                      ${{ runner.os }}-nextjs-${{ matrix.folder }}-

            - name: Cache TanStack builds
              if: steps.config.outputs.app-type == 'tanstack'
              uses: actions/cache@v4
              with:
                  path: |
                      apps/${{ matrix.folder }}/dist
                      apps/${{ matrix.folder }}/node_modules/.vite
                  key:
                      ${{ runner.os }}-tanstack-${{ matrix.folder }}-${{ hashFiles('pnpm-lock.yaml') }}-${{
                      hashFiles('apps/${{ matrix.folder }}/**/*.{ts,tsx,js,jsx}') }}-${{ hashFiles('apps/${{
                      matrix.folder }}/wrangler.jsonc', 'apps/${{ matrix.folder }}/vite.config.ts') }}
                  restore-keys: |
                      ${{ runner.os }}-tanstack-${{ matrix.folder }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/${{ matrix.folder }}/**/*.{ts,tsx,js,jsx}') }}-
                      ${{ runner.os }}-tanstack-${{ matrix.folder }}-${{ hashFiles('pnpm-lock.yaml') }}-
                      ${{ runner.os }}-tanstack-${{ matrix.folder }}-

            - name: Verify build tools
              run: |
                  echo "🔍 Verifying build tool installation..."
                  echo "  - tsup: $(pnpm exec tsup --version 2>&1 || echo 'installed')"
                  echo "  - rimraf: $(pnpm exec rimraf --version 2>&1 || echo 'installed')"

                  if [ "${{ steps.config.outputs.app-type }}" == "nextjs" ]; then
                    echo "  - next: $(pnpm exec next --version 2>&1 || echo 'installed')"
                  fi

                  if [ "${{ steps.config.outputs.app-type }}" == "tanstack" ]; then
                    echo "  - vite: $(pnpm exec vite --version 2>&1 || echo 'installed')"
                  fi

                  echo "✅ Build tools verified"

            - name: Restore packages cache
              id: restore-packages
              run: |
                  echo "📦 Restoring pre-built packages from cache..."

                  # Must match build-packages.yml key: LOCK + ROOT + PACKAGE hashes
                  PACKAGE_HASH=$(find packages -type f \
                    -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" -o -name "*.json" \
                    | sort | xargs cat | sha256sum | cut -d' ' -f1)

                  LOCK_HASH=$(sha256sum pnpm-lock.yaml | cut -d' ' -f1)
                  ROOT_HASH=$(cat turbo.json package.json pnpm-workspace.yaml | sha256sum | cut -d' ' -f1)
                  CACHE_KEY="packages-build-${LOCK_HASH}-${ROOT_HASH}-${PACKAGE_HASH}"

                  echo "cache-key=${CACHE_KEY}" >> $GITHUB_OUTPUT
                  echo "📦 Cache key: ${CACHE_KEY}"

            - name: Restore cached packages
              uses: actions/cache/restore@v4
              with:
                  path: |
                      packages/*/dist
                      packages/*/build
                      packages/*/.turbo
                      .turbo
                  key: ${{ steps.restore-packages.outputs.cache-key }}
                  restore-keys: |
                      packages-build-${{ hashFiles('pnpm-lock.yaml') }}-
                  fail-on-cache-miss: true

            - name: Build application
              run: |
                  export PATH="${GITHUB_WORKSPACE}/node_modules/.bin:$PATH"
                  BUILD_CMD="${{ steps.config.outputs.build-cmd }}"
                  echo "⏳ Building ${{ matrix.name }} using '${BUILD_CMD}'..."

                  pnpm --filter=${{ matrix.name }} run ${BUILD_CMD}
                  BUILD_EXIT=$?

                  if [ $BUILD_EXIT -ne 0 ]; then
                    echo ""
                    echo "❌ ERROR: Application build failed"
                    exit 1
                  fi

                  if [ "${{ steps.config.outputs.app-type }}" == "nextjs" ]; then
                    if [ ! -d "apps/${{ matrix.folder }}/.next" ]; then
                      echo "❌ ERROR: Next.js build output not found"
                      exit 1
                    fi
                    echo "✅ Next.js build output verified (.next directory exists)"
                  fi

                  if [ "${{ steps.config.outputs.app-type }}" == "tanstack" ]; then
                    if [ ! -d "apps/${{ matrix.folder }}/dist" ]; then
                      echo "❌ ERROR: TanStack/Vite build output not found"
                      exit 1
                    fi
                    echo "✅ TanStack/Vite build output verified (dist directory exists)"
                  fi

                  echo "✅ Application build completed successfully"
              env:
                  NODE_ENV: production

            - name: Build Cloudflare Worker
              if: steps.config.outputs.worker-build-cmd != ''
              working-directory: apps/${{ matrix.folder }}
              run: |
                  WORKER_BUILD_CMD="${{ steps.config.outputs.worker-build-cmd }}"
                  echo "⏳ Building Cloudflare Worker bundle using '${WORKER_BUILD_CMD}'..."

                  if [ "${{ steps.config.outputs.app-type }}" == "nextjs" ]; then
                    if [ ! -d ".next" ]; then
                      echo "❌ ERROR: .next directory not found in $(pwd)"
                      exit 1
                    fi
                    echo "✅ .next directory found, proceeding with worker build..."
                  fi

                  pnpm run ${WORKER_BUILD_CMD}
                  BUILD_EXIT_CODE=$?

                  if [ $BUILD_EXIT_CODE -ne 0 ]; then
                    echo "❌ ERROR: Cloudflare Worker build failed (exit code: ${BUILD_EXIT_CODE})"
                    exit 1
                  fi

                  echo "✅ Cloudflare Worker bundle built successfully"

            - name: Verify worker bundle
              working-directory: apps/${{ matrix.folder }}
              run: |
                  echo "🔍 Verifying Cloudflare Worker bundle structure..."

                  VERIFY_PATHS="${{ steps.config.outputs.verify-paths }}"

                  if [ -z "$VERIFY_PATHS" ]; then
                    echo "⚠️  No verification paths specified in config, skipping verification"
                    exit 0
                  fi

                  MISSING_PATHS=()
                  while IFS= read -r path; do
                    if [ -n "$path" ]; then
                      if [ ! -e "$path" ]; then
                        MISSING_PATHS+=("$path")
                      else
                        echo "  ✅ $path"
                      fi
                    fi
                  done <<< "$VERIFY_PATHS"

                  if [ ${#MISSING_PATHS[@]} -ne 0 ]; then
                    echo "❌ ERROR: Required paths not found after build"
                    printf '  • %s\n' "${MISSING_PATHS[@]}"
                    exit 1
                  fi

                  echo "✅ Worker bundle structure verified - all required paths exist"

            - name: Generate preview wrangler config
              working-directory: apps/${{ matrix.folder }}
              run: |
                  echo "🔧 Generating preview wrangler config..."
                  python ../../.github/scripts/substitute-wrangler-secrets.py
              env:
                  WRANGLER_CONFIG: ${{ steps.config.outputs.wrangler-config }}
                  OUTPUT_FILE: wrangler.preview.jsonc
                  TARGET_ENV: preview
                  SECRETS_JSON: ${{ toJson(secrets) }}

            - name: Verify preview wrangler config
              working-directory: apps/${{ matrix.folder }}
              run: |
                  if [ ! -f "wrangler.preview.jsonc" ]; then
                    echo "❌ ERROR: wrangler.preview.jsonc not found - Generate step must run first"
                    exit 1
                  fi
                  echo "✅ wrangler.preview.jsonc ready for deploy"

            - name: Deploy preview to Cloudflare Workers
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: apps/${{ matrix.folder }}
                  command:
                      # --env preview  → use env.preview bindings/vars from wrangler.preview.jsonc
                      # --name <name>  → explicitly sets the deployed worker name; overrides the default
                      #                  <name>-preview suffix that Wrangler would otherwise append.
                      #                  The resulting worker is named exactly <base>-pr-<N>, not <base>-pr-<N>-preview.
                      # This is intentional: cleanup uses wrangler delete --name <base>-pr-<N> to match.
                      deploy --env preview --name ${{ steps.preview-name.outputs.preview-name }} --config
                      wrangler.preview.jsonc
              continue-on-error: false

            - name: Preview deployment summary
              if: success()
              run: |
                  PREVIEW_URL="https://${{ steps.preview-name.outputs.preview-name }}.${{ steps.config.outputs.worker-subdomain }}.workers.dev/"
                  echo "✅ Preview deployed: ${PREVIEW_URL}"

            - name: Verify deployed worker name via Cloudflare API
              # Confirms the worker was registered under the exact --name we passed (not <name>-preview).
              # Wrangler docs: explicit --name overrides any env-derived suffix; this step makes that visible.
              # Soft check only — a failed API call does not fail the deployment.
              if: success()
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  PREVIEW_NAME="${{ steps.preview-name.outputs.preview-name }}"
                  HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                    -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                    "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${PREVIEW_NAME}")
                  if [ "$HTTP" = "200" ]; then
                    echo "✅ Worker '${PREVIEW_NAME}' confirmed in Cloudflare (HTTP 200) — no -preview suffix appended"
                  else
                    echo "::warning::Worker '${PREVIEW_NAME}' not found via API (HTTP ${HTTP}) — verify manually in Cloudflare dashboard"
                  fi

            - name: Preview deployment failure summary
              if: failure()
              run: |
                  PREVIEW_URL="https://${{ steps.preview-name.outputs.preview-name }}.${{ steps.config.outputs.worker-subdomain }}.workers.dev/"
                  echo "❌ Preview deployment failed: ${PREVIEW_URL}"

    # Cleanup preview when PR closes
    cleanup-preview:
        if: github.event.action == 'closed'
        runs-on: ubuntu-latest
        name: Cleanup preview worker
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts=false

            - name: Install wrangler CLI
              run: pnpm add -w wrangler@4 --save-dev

            - name: Determine worker subdomain
              id: cleanup-config
              run: |
                  WORKER_SUBDOMAIN="${{ secrets.CF_WORKER_SUBDOMAIN }}"
                  if [ -z "$WORKER_SUBDOMAIN" ]; then
                    WORKER_SUBDOMAIN="apiary"
                  fi
                  echo "worker-subdomain=${WORKER_SUBDOMAIN}" >> $GITHUB_OUTPUT

            - name: Delete preview workers for all apps
              id: delete-previews
              # Loop over every configured app and delete its preview worker.
              # Preview workers are deployed with an explicit --name override (not via --env),
              # so wrangler delete must use --name to target the correct worker.
              run: |
                  APPS_TO_DEPLOY="${{ secrets.APPS_TO_DEPLOY }}"
                  if [ -z "$APPS_TO_DEPLOY" ]; then
                    APPS_TO_DEPLOY="ottabase-template-app-tanstack,ottabase-template-app-nextjs-homepage"
                  fi

                  WORKER_SUBDOMAIN="${{ steps.cleanup-config.outputs.worker-subdomain }}"
                  PR_NUMBER="${{ github.event.pull_request.number }}"

                  IFS=',' read -ra TARGET_APPS <<< "$APPS_TO_DEPLOY"

                  for app in "${TARGET_APPS[@]}"; do
                    app=$(echo "$app" | xargs) # trim whitespace

                    # Resolve folder name (supports both folder name and package name)
                    APP_FOLDER=""
                    if [ -d "apps/${app}" ]; then
                      APP_FOLDER="${app}"
                    else
                      for dir in apps/*/; do
                        if [ -f "${dir}package.json" ]; then
                          PKG_NAME=$(jq -r '.name // empty' "${dir}package.json")
                          if [ "$PKG_NAME" == "$app" ]; then
                            APP_FOLDER=$(basename "$dir")
                            break
                          fi
                        fi
                      done
                    fi

                    if [ -z "$APP_FOLDER" ]; then
                      echo "⚠️ Could not find folder for '${app}', skipping cleanup"
                      continue
                    fi

                    # Determine base worker name from cloudflare-config.json
                    CONFIG_JSON="apps/${APP_FOLDER}/cloudflare-config.json"
                    BASE_NAME="${APP_FOLDER}"
                    if [ -f "$CONFIG_JSON" ]; then
                      CANDIDATE=$(jq -r '.workerName // empty' "$CONFIG_JSON")
                      if [ -n "$CANDIDATE" ] && [ "$CANDIDATE" != "null" ]; then
                        BASE_NAME="$CANDIDATE"
                      fi
                    fi

                    PREVIEW_NAME="${BASE_NAME}-pr-${PR_NUMBER}"
                    PREVIEW_URL="https://${PREVIEW_NAME}.${WORKER_SUBDOMAIN}.workers.dev/"

                    echo "🧹 Deleting preview worker: ${PREVIEW_NAME}"
                    # Use --name because previews are deployed with an explicit name override,
                    # not via a named wrangler environment. --env would target a different worker.
                    pnpm exec wrangler delete --name "${PREVIEW_NAME}" || echo "⚠️ Delete failed or worker already absent: ${PREVIEW_NAME}"
                    echo "   ${PREVIEW_URL}"
                  done
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              continue-on-error: true

            - name: Cleanup summary
              if: always() && steps.delete-previews.outcome == 'success'
              run: |
                  echo "🧹 Preview worker cleanup complete for PR #${{ github.event.pull_request.number }}"

            - name: Cleanup failure summary
              if: always() && steps.delete-previews.outcome == 'failure'
              run: |
                  echo "⚠️ One or more preview worker cleanups may have failed for PR #${{ github.event.pull_request.number }}"
