<!doctype html>
<html lang="en" suppressHydrationWarning>
    <head>
        <!-- Apply theme from localStorage before React mounts (prevents light flash when dark is saved) -->
        <script>
            (function () {
                var theme = localStorage.getItem('ottabase.theme');
                if (theme === 'dark' || theme === 'light') {
                    document.documentElement.classList.add(theme);
                }
            })();
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Fonts (matches Next template choices, without next/font) -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&family=Patrick+Hand&family=Work+Sans:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <title>Ottabase Template (TanStack)</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
